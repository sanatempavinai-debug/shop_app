version: '3.9'

services:

  # =================== PostgreSQL ===================
  db:
    image: postgres:16-alpine
    container_name: shop_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: shopdb
      POSTGRES_USER: shopuser
      POSTGRES_PASSWORD: shoppass123
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopuser -d shopdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # =================== Web App ===================
  app:
    build: .
    container_name: shop_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://shopuser:shoppass123@db:5432/shopdb
    volumes:
      - ./uploads:/app/uploads
      - ./templates:/app/templates
      - ./static:/app/static
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
